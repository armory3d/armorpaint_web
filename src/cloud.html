      <div class="col-md-6 p-lg-5 mx-auto my-5 rounded pt-3 fade-in">
        <h1 class="display-3 fw-bold">Cloud</h1>
        <h3 class="fw-normal text-muted mb-3">Library of materials, brushes, decals, masks, meshes and HDRIs to get you started.</h3>
      </div>

      <div class="col-md-6 p-lg-5 mx-auto my-5 bg-body-tertiary rounded pt-3 fade-in">
        <h5 class="fw-normal text-muted mb-3">Open 'Browser - Cloud' in ArmorPaint and drag assets into your projects.</h5>
        <img src="img/browser.jpg" class="img-fluid rounded-3 mb-4" loading="lazy">
      </div>

      <h5 class="fw-normal text-muted text-center mb-5">Contains assets from <a href="https://armorpaint.org/">ArmorPaint</a>, <a href="https://ambientcg.com/">AmbientCG</a> and <a href="https://polyhaven.com/">PolyHaven</a>. ❤️ Licensed under CC0.</h5>

      <script>
      document.addEventListener('DOMContentLoaded', () => {
        const searchInput = document.getElementById('asset-search');
        const assetGrid = document.getElementById('asset-grid');
        const galleryItems = assetGrid.querySelectorAll('div');

        searchInput.addEventListener('input', (e) => {
          const searchTerm = e.target.value.toLowerCase();

          galleryItems.forEach(item => {
            const textContent = item.textContent.toLowerCase();
            const imageAlt = item.querySelector('img')?.alt?.toLowerCase() || '';

            if (textContent.includes(searchTerm) || imageAlt.includes(searchTerm)) {
              item.style.display = '';
            } else {
              item.style.display = 'none';
            }
          });
        });
      });
      </script>
